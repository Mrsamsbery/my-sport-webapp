<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ставки Анализ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #11141a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .counter-box {
            background-color: #1b202c;
            padding: 12px 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #2c354a;
            color: #00ff88;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #2c354a;
            background-color: #1b202c;
            color: #ffffff;
            box-sizing: border-box;
            resize: none;
            font-size: 16px;
            margin-bottom: 15px;
        }

        textarea:focus {
            outline: none;
            border-color: #00ff88;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background-color: #00ff88;
            color: #11141a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled {
            background-color: #2c354a;
            color: #666666;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #1b202c;
            border: 1px solid #2c354a;
            border-radius: 12px;
            min-height: 50px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>AI Анализатор Ставок</h2>
        </div>

        <div id="limits-counter" class="counter-box">
            🔄 Получение лимитов с сервера...
        </div>

        <textarea id="text-input" placeholder="Вставьте текст купона или данные матча..."></textarea>

        <button id="submit-btn" onclick="sendDataToProcess()">Обработать данные ИИ</button>

        <div id="result-block" class="result-box" style="display: none;"></div>
    </div>

    <script>
        // Инициализируем WebApp Телеграма
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); 

        // Ссылка от ngrok, скопированная из консоли твоего сервера Hostman
        const BACKEND_URL = "https://frostbite-unhook-smokiness.ngrok-free.dev"; 

        // Получаем уникальный Telegram ID пользователя
        function getTelegramUserId() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                return tg.initDataUnsafe.user.id;
            }
            return "guest";
        }

        // 1. ЗАГРУЗКА ЛИМИТОВ ПРИ СТАРТЕ СТРАНИЦЫ
        async function loadUserData() {
            const userId = getTelegramUserId();
            const counterElement = document.getElementById("limits-counter");
            const btn = document.getElementById("submit-btn");

            try {
                const response = await fetch(`${BACKEND_URL}/api/user?user_id=${userId}`);
                const data = await response.json();

                if (data.success) {
                    counterElement.innerText = `Доступно запросов на сегодня: ${data.requests_left} из 3`;
                    
                    if (data.requests_left === 0) {
                        btn.disabled = true;
                        btn.innerText = "Лимит на сегодня исчерпан";
                    }
                } else {
                    counterElement.style.color = "#ff4444";
                    counterElement.innerText = "⚠️ Не удалось загрузить лимиты";
                }
            } catch (error) {
                console.error("Ошибка:", error);
                counterElement.style.color = "#ff4444";
                counterElement.innerText = "🔌 Сервер аналитики временно недоступен";
            }
        }

        // 2. ОТПРАВКА ДАННЫХ ПРИ НАЖАТИИ КНОПКИ
        async function sendDataToProcess() {
            const userId = getTelegramUserId();
            const textInput = document.getElementById("text-input").value;
            const resultBlock = document.getElementById("result-block");
            const counterElement = document.getElementById("limits-counter");
            const btn = document.getElementById("submit-btn");

            if (!textInput.trim()) {
                alert("Пожалуйста, введите данные для анализа!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Анализ данных ИИ...";

            try {
                const response = await fetch(`${BACKEND_URL}/api/process`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        text: textInput
                    })
                });

                const data = await response.json();

                if (response.status === 403) {
                    alert(data.error);
                    counterElement.innerText = `Доступно запросов на сегодня: 0 из 3`;
                    btn.innerText = "Лимит на сегодня исчерпан";
                    return;
                }

                if (data.success) {
                    resultBlock.style.display = "block";
                    resultBlock.innerText = data.result;

                    // Обновляем счетчик на экране новым значением из бэкенда
                    counterElement.innerText = `Доступно запросов на сегодня: ${data.requests_left} из 3`;
                    
                    if (data.requests_left === 0) {
                        btn.innerText = "Лимит на сегодня исчерпан";
                    } else {
                        btn.disabled = false;
                        btn.innerText = "Обработать данные ИИ";
                    }
                } else {
                    alert("Ошибка при анализе на стороне сервера.");
                    btn.disabled = false;
                    btn.innerText = "Обработать данные ИИ";
                }
            } catch (error) {
                console.error(error);
                alert("Не удалось отправить данные на server.");
                btn.disabled = false;
                btn.innerText = "Обработать данные ИИ";
            }
        }

        window.onload = loadUserData;
    </script>
</body>
</html>
