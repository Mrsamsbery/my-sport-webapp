<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Спортивный Аналитик</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #0b0e14; color: #ffffff; padding: 16px; display: flex; flex-direction: column; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 24px; padding-top: 10px; }
        .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .header p { font-size: 13px; color: #6c7883; }
        .main-card { background: #141923; border-radius: 16px; padding: 20px; border: 1px solid #1f2735; }
        .upload-zone { border: 2px dashed #2c384e; border-radius: 12px; padding: 40px 16px; text-align: center; cursor: pointer; background: #1a202c; }
        .upload-icon { font-size: 40px; margin-bottom: 12px; display: inline-block; }
        .upload-text { font-size: 15px; font-weight: 500; color: #e2e8f0; }
        #file-input { display: none; }
        .preview-container { display: none; margin-top: 16px; text-align: center; }
        .preview-image { max-width: 100%; max-height: 180px; border-radius: 8px; }
        .btn { background-color: #00e676; color: #0b0e14; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 16px; }
        .btn:disabled { background-color: #1f2735; color: #6c7883; cursor: not-allowed; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="header">
        <h1>AI Анализатор Ставок</h1>
        <p>Загрузите скриншот линии матча</p>
    </div>

    <div class="main-card">
        <div class="upload-zone" onclick="triggerSelect()">
            <span class="upload-icon">📸</span>
            <div class="upload-text" id="upload-status">Нажмите для выбора скриншота</div>
        </div>
        <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">

        <div class="preview-container" id="preview-container">
            <img src="" id="image-preview" class="preview-image">
        </div>

        <button class="btn" id="send-btn" disabled onclick="sendPhotoToBot()">Проанализировать ставку</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        let base64Data = "";

        function triggerSelect() {
            document.getElementById('file-input').click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('upload-status').innerText = "Файл выбран!";
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('preview-container').style.display = 'block';
                document.getElementById('send-btn').disabled = false;
                
                // Извлекаем чистый Base64 код картинки
                base64Data = e.target.result.split(',')[1];
            }
            reader.readAsDataURL(file);
        }

        function sendPhotoToBot() {
            if (!base64Data) return;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('send-btn').innerText = "Отправка боту...";

            // Отправляем строку с картинкой в нашего Python-бота
            tg.sendData(base64Data);
            
            // Закрываем WebApp окно
            tg.close();
        }
    </script>
</body>
</html>
