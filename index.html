<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Анализатор Ставок</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #0b0e14; color: #ffffff; padding: 16px; display: flex; flex-direction: column; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 24px; padding-top: 10px; }
        .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .header p { font-size: 13px; color: #6c7883; }
        .main-card { background: #141923; border-radius: 16px; padding: 20px; border: 1px solid #1f2735; box-shadow: 0 8px 24px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .upload-zone { border: 2px dashed #2c384e; border-radius: 12px; padding: 40px 16px; text-align: center; cursor: pointer; background: #1a202c; }
        .upload-icon { font-size: 40px; margin-bottom: 12px; display: inline-block; }
        .upload-text { font-size: 15px; font-weight: 500; color: #e2e8f0; }
        #file-input { display: none; }
        .preview-container { display: none; margin-top: 16px; text-align: center; }
        .preview-image { max-width: 100%; max-height: 180px; border-radius: 8px; }
        .btn { background-color: #00e676; color: #0b0e14; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 16px; }
        .btn:disabled { background-color: #1f2735; color: #6c7883; cursor: not-allowed; }
        
        .result-container { display: none; margin-top: 8px; }
        .match-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .sport-badge { display: inline-block; background: #222b3c; color: #00e676; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
        .outcome-box { background: #1a202c; border-radius: 12px; padding: 16px; border-left: 4px solid #00e676; margin-bottom: 16px; }
        .outcome-label { font-size: 12px; color: #6c7883; text-transform: uppercase; margin-bottom: 4px; }
        .outcome-value { font-size: 20px; font-weight: 700; }
        .progress-section { margin-bottom: 16px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
        .progress-bar-bg { background: #222b3c; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(90deg, #00c865, #00e676); height: 100%; width: 0%; transition: width 1s ease-out; border-radius: 5px; }
        .reason-box { background: #1a202c; border-radius: 12px; padding: 14px; font-size: 14px; line-height: 1.5; color: #cbd5e1; }
        
        .loader { display: none; text-align: center; padding: 20px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #00e676; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="header">
        <h1>AI Анализатор Ставок</h1>
        <p>Анализ линии матча прямо в приложении</p>
    </div>

    <div class="main-card">
        <div class="upload-zone" onclick="triggerSelect()">
            <span class="upload-icon">📸</span>
            <div class="upload-text" id="upload-status">Нажмите для выбора скриншота</div>
        </div>
        <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">

        <div class="preview-container" id="preview-container">
            <img src="" id="image-preview" class="preview-image">
        </div>

        <button class="btn" id="send-btn" disabled onclick="startFullAnalysis()">Проанализировать ставку</button>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div id="loader-text" style="font-size: 14px; color: #6c7883;">Загрузка скриншота в облако...</div>
    </div>

    <div class="main-card result-container" id="result-card">
        <div class="match-title" id="res-match">-</div>
        <div class="sport-badge" id="res-sport">-</div>

        <div class="outcome-box">
            <div class="outcome-label">Самый вероятный исход</div>
            <div class="outcome-value" id="res-outcome">-</div>
        </div>

        <div class="progress-section">
            <div class="progress-header">
                <span>Математическая уверенность</span>
                <span id="res-percent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="res-bar"></div>
            </div>
        </div>

        <div class="outcome-label" style="margin-bottom: 6px;">Аналитическое обоснование</div>
        <div class="reason-box" id="res-reason">-</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        const IMGBB_API_KEY = "ef89d67af46ee9756225dc9ab1f4bd3b"; 
        
        // !!! СЮДА ВСТАВЬ ССЫЛКУ, КОТОРУЮ ТЕБЕ ВЫДАСТ NGROK !!!
        const BACKEND_URL = "https://frostbite-unhook-smokiness.ngrok-free.dev"; 

        let selectedFile = null;

        function triggerSelect() {
            document.getElementById('file-input').click();
        }

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (!selectedFile) return;
            document.getElementById('upload-status').innerText = "Файл готов!";
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('preview-container').style.display = 'block';
                document.getElementById('send-btn').disabled = false;
            }
            reader.readAsDataURL(selectedFile);
        }

        function startFullAnalysis() {
            if (!selectedFile) return;
            
            document.getElementById('result-card').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('send-btn').disabled = true;
            document.getElementById('loader-text').innerText = "Загрузка скриншота в облако...";

            // 1. Загружаем на ImgBB
            let formData = new FormData();
            formData.append("image", selectedFile);

            fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(imgResult => {
                if (imgResult.success) {
                    const imageUrl = imgResult.data.url;
                    document.getElementById('loader-text').innerText = "AI считывает текст и строит прогноз...";
                    
                    // 2. Отправляем ссылку на наш Python сервер через ngrok
                    return fetch(`${BACKEND_URL}/api/analyze`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ image_url: imageUrl })
                    });
                } else {
                    throw new Error("Ошибка фотохостинга");
                }
            })
            .then(res => res.json())
            .then(backendResult => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('send-btn').disabled = false;

                if (backendResult.success) {
                    const prediction = backendResult.data;
                    
                    // Красиво заполняем карточку результата реальными данными от ИИ!
                    document.getElementById('res-match').innerText = prediction.match;
                    document.getElementById('res-sport').innerText = prediction.sport;
                    document.getElementById('res-outcome').innerText = prediction.outcome;
                    document.getElementById('res-percent').innerText = prediction.percent + "%";
                    document.getElementById('res-bar').style.width = prediction.percent + "%";
                    document.getElementById('res-reason').innerText = prediction.reason;
                    
                    // Плавно показываем блок результата
                    document.getElementById('result-card').style.display = 'block';
                } else {
                    alert("Ошибка анализа: " + backendResult.error);
                }
            })
            .catch(err => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('send-btn').disabled = false;
                alert("Произошла ошибка: " + err.message);
            });
        }
    </script>
</body>
</html>
