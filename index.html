<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Анализатор Ставок</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #0b0e14; color: #ffffff; padding: 16px; display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { text-align: center; margin-bottom: 20px; padding-top: 10px; }
        .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #fff; }
        .header p { font-size: 13px; color: #6c7883; }
        
        .main-card { background: #141923; border-radius: 16px; padding: 20px; border: 1px solid #1f2735; box-shadow: 0 8px 24px rgba(0,0,0,0.3); margin-bottom: 16px; }
        
        .upload-zone { border: 2px dashed #2c384e; border-radius: 12px; padding: 30px 16px; text-align: center; cursor: pointer; background: #1a202c; }
        .upload-icon { font-size: 36px; margin-bottom: 8px; display: inline-block; }
        .upload-text { font-size: 14px; font-weight: 500; color: #e2e8f0; }
        #file-input { display: none; }
        
        .preview-container { display: none; margin-top: 16px; text-align: center; }
        .preview-image { max-width: 100%; max-height: 140px; border-radius: 8px; border: 1px solid #1f2735; }
        
        .btn { background-color: #00e676; color: #0b0e14; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 16px; }
        .btn:disabled { background-color: #1f2735; color: #6c7883; cursor: not-allowed; }
        
        .limit-counter { text-align: center; font-size: 12px; color: #6c7883; margin-top: 10px; font-weight: 500; }
        .limit-counter span { color: #00e676; font-weight: 700; }
        
        .result-container { display: none; }
        .card-panel { background: #141923; border-radius: 16px; padding: 16px; border: 1px solid #1f2735; margin-bottom: 12px; }
        
        .sport-badge { display: inline-flex; align-items: center; background: #1e2638; color: #00e676; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 10px; border: 1px solid rgba(0,230,118,0.1); }
        .match-title { font-size: 20px; font-weight: 700; line-height: 1.3; color: #ffffff; }
        .tournament-title { font-size: 13px; color: #6c7883; font-weight: 500; margin-top: 4px; }
        
        .outcome-card { background: linear-gradient(135deg, #152228, #111a24); border-left: 4px solid #00e676; }
        .section-label { font-size: 11px; color: #6c7883; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .outcome-value { font-size: 22px; font-weight: 800; color: #00e676; }
        
        .info-block { margin-bottom: 14px; }
        .info-block:last-child { margin-bottom: 0; }
        .info-text { font-size: 14px; line-height: 1.5; color: #cbd5e1; margin-top: 4px; }
        
        .analytics-row { display: flex; align-items: center; gap: 20px; margin-top: 10px; }
        .chart-wrapper { position: relative; width: 85px; height: 85px; flex-shrink: 0; }
        .circle-chart { transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: #1f2735; stroke-width: 3.8; }
        .circle-fill { fill: none; stroke: #00e676; stroke-width: 3.8; stroke-linecap: round; stroke-dasharray: 0, 100; transition: stroke-dasharray 1.2s ease-out; }
        .chart-percentage { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; font-weight: 700; color: #ffffff; }
        
        .history-title { font-size: 16px; font-weight: 700; margin: 10px 0 12px 4px; color: #e2e8f0; }
        .history-item { background: #141923; border: 1px solid #1f2735; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .hist-info { display: flex; flex-direction: column; gap: 2px; max-width: 70%; }
        .hist-match { font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hist-meta { font-size: 11px; color: #6c7883; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hist-badge { background: #1b2230; color: #00e676; padding: 4px 8px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1px solid rgba(0,230,118,0.1); text-align: center; min-width: 75px; }

        .loader { display: none; text-align: center; padding: 30px 20px; }
        .spinner { border: 4px solid rgba(255,255,255,0.05); width: 40px; height: 40px; border-radius: 50%; border-left-color: #00e676; animation: spin 0.8s linear infinite; display: inline-block; margin-bottom: 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="header">
        <h1>AI Анализатор Ставок</h1>
        <p>Профессиональный капперский ИИ-разбор</p>
    </div>

    <div class="main-card" id="upload-card">
        <div class="upload-zone" onclick="triggerSelect()">
            <span class="upload-icon">📸</span>
            <div class="upload-text" id="upload-status">Выбрать скриншот линии</div>
        </div>
        <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
        <div class="preview-container" id="preview-container">
            <img src="" id="image-preview" class="preview-image">
        </div>
        <button class="btn" id="send-btn" disabled onclick="startFullAnalysis()">Проанализировать ставку</button>
        <div class="limit-counter" id="limit-display">Загрузка лимитов...</div>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div id="loader-text" style="font-size: 14px; color: #6c7883;">Оцифровка изображения...</div>
    </div>

    <div class="result-container" id="result-layout">
        <div class="card-panel">
            <div class="sport-badge" id="res-sport">-</div>
            <div class="match-title" id="res-match">-</div>
            <div class="tournament-title" id="res-tournament">-</div>
        </div>

        <div class="card-panel outcome-card">
            <div class="section-label">🎯 Капперский прогноз и выбор</div>
            <div class="outcome-value" id="res-outcome">-</div>
        </div>

        <div class="card-panel">
            <div class="info-block">
                <div class="section-label">📈 Форма команд и кондиции</div>
                <div class="info-text" id="res-form">-</div>
            </div>
            <div class="info-block" style="margin-top: 14px;">
                <div class="section-label">📊 Статистика и личные встречи</div>
                <div class="info-text" id="res-stats">-</div>
            </div>
        </div>

        <div class="card-panel">
            <div class="section-label">🧠 Итоговое заключение ИИ</div>
            <div class="analytics-row">
                <div class="chart-wrapper">
                    <svg viewBox="0 0 36 36" class="circle-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle-fill" id="res-circle" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="chart-percentage" id="res-percent">0%</div>
                </div>
                <div class="info-text" id="res-reason" style="margin-top:0; flex:1;">-</div>
            </div>
        </div>
        <button class="btn" style="background-color: #1a202c; color: #6c7883; border: 1px solid #1f2735;" onclick="resetAnalyzer()">Загрузить другой скриншот</button>
    </div>

    <div id="history-section">
        <div class="history-title">📜 Последние прогнозы</div>
        <div id="history-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        const USER_TELEGRAM_ID = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "guest";

        const IMGBB_API_KEY = "ef89d67af46ee9756225dc9ab1f4bd3b"; 
        const BACKEND_URL = "https://frostbite-unhook-smokiness.ngrok-free.dev"; 

        let selectedFile = null;

        window.onload = function() {
            loadHistory();
            updateLimitDisplay();
        };

        function updateLimitDisplay() {
            // Добавили специальный заголовок, обходящий экран ngrok
            fetch(`${BACKEND_URL}/api/get_limits?user_id=${USER_TELEGRAM_ID}`, {
                headers: { "ngrok-skip-browser-warning": "true" }
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('limit-display').innerHTML = `Осталось бесплатных прогнозов на сегодня: <span>${data.left_today} из 5</span>`;
                }
            })
            .catch(err => console.log("Ошибка лимитов: " + err));
        }

        function triggerSelect() {
            document.getElementById('file-input').click();
        }

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (!selectedFile) return;
            document.getElementById('upload-status').innerText = "Скриншот успешно выбран!";
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('preview-container').style.display = 'block';
                document.getElementById('send-btn').disabled = false;
            }
            reader.readAsDataURL(selectedFile);
        }

        function startFullAnalysis() {
            if (!selectedFile) return;
            
            document.getElementById('result-layout').style.display = 'none';
            document.getElementById('upload-card').style.display = 'none';
            document.getElementById('history-section').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('loader-text').innerText = "Загрузка скриншота в облако...";

            let formData = new FormData();
            formData.append("image", selectedFile);

            fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(imgResult => {
                if (imgResult.success) {
                    const imageUrl = imgResult.data.url;
                    document.getElementById('loader-text').innerText = "Проверка лимитов и разбор линии...";
                    
                    return fetch(`${BACKEND_URL}/api/analyze`, {
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json",
                            "ngrok-skip-browser-warning": "true" // Пробиваем ngrok и тут
                        },
                        body: JSON.stringify({ 
                            image_url: imageUrl,
                            user_id: USER_TELEGRAM_ID 
                        })
                    });
                } else {
                    throw new Error("Ошибка фотохостинга");
                }
            })
            .then(res => {
                if (res.status === 429 || !res.ok) {
                    return res.json().then(errData => { throw new Error(errData.error); });
                }
                return res.json();
            })
            .then(backendResult => {
                document.getElementById('loader').style.display = 'none';

                if (backendResult.success) {
                    const prediction = backendResult.data;
                    
                    document.getElementById('res-match').innerText = prediction.match;
                    document.getElementById('res-sport').innerText = prediction.sport;
                    document.getElementById('res-tournament').innerText = prediction.tournament;
                    document.getElementById('res-outcome').innerText = prediction.outcome;
                    document.getElementById('res-form').innerText = prediction.form;
                    document.getElementById('res-stats').innerText = prediction.stats;
                    document.getElementById('res-reason').innerText = prediction.reason;
                    
                    document.getElementById('res-percent').innerText = prediction.percent + "%";
                    document.getElementById('res-circle').style.strokeDasharray = `${prediction.percent}, 100`;
                    
                    document.getElementById('result-layout').style.display = 'block';
                    loadHistory();
                    updateLimitDisplay();
                }
            })
            .catch(err => {
                document.getElementById('loader').style.display = 'none';
                alert(err.message);
                resetAnalyzer();
            });
        }

        function loadHistory() {
            fetch(`${BACKEND_URL}/api/history?user_id=${USER_TELEGRAM_ID}`, {
                headers: { "ngrok-skip-browser-warning": "true" } // Пробиваем ngrok для истории
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    const container = document.getElementById('history-list');
                    container.innerHTML = ""; 
                    
                    if(result.history.length === 0) {
                        container.innerHTML = `<div style="text-align:center; color:#6c7883; font-size:13px; padding:10px;">Прогнозов сегодня еще не было</div>`;
                        return;
                    }

                    result.history.forEach(item => {
                        const html = `
                            <div class="history-item">
                                <div class="hist-info">
                                    <div class="hist-match">${item.match_name}</div>
                                    <div class="hist-meta">${item.date} • ${item.tournament || item.sport}</div>
                                    <div class="hist-outcome">Выбор: <b>${item.outcome}</b></div>
                                </div>
                                <div class="hist-badge">
                                    🎯 Уверенность<br>
                                    <span style="font-size:13px;">${item.percent}%</span>
                                </div>
                            </div>
                        `;
                        container.innerHTML += html;
                    });
                }
            })
            .catch(err => console.log("Ошибка истории: " + err));
        }

        function resetAnalyzer() {
            document.getElementById('result-layout').style.display = 'none';
            document.getElementById('preview-container').style.display = 'none';
            document.getElementById('upload-card').style.display = 'block';
            document.getElementById('history-section').style.display = 'block';
            document.getElementById('send-btn').disabled = true;
            document.getElementById('upload-status').innerText = "Выбрать скриншот линии";
            selectedFile = null;
            loadHistory();
            updateLimitDisplay();
        }
    </script>
</body>
</html>
