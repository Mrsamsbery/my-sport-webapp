<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ставки Ai анализ</title>
    <style>
        :root {
            --bg-dark: #090d0a; 
            --card-bg: #111612; 
            --border-color: rgba(255, 255, 255, 0.05);
            --neon-green: #10b981; 
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --accent-cyan: #06b6d4; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            padding: 16px;
            padding-bottom: 110px; 
        }

        /* ОТДЕЛЕННОЕ ОКОШКО: КНОПКА НАЗАД */
        .navigation-panel {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: rgba(17, 22, 18, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 15px rgba(6, 182, 212, 0.15);
            z-index: 1000;
        }

        .btn-back {
            width: 100%;
            background: linear-gradient(90deg, #06b6d4 0%, #3b82f6 100%);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            padding: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
        }

        .card-meta {
            font-size: 11px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .match-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .league-title {
            font-size: 13px;
            color: var(--neon-green);
            font-weight: 500;
        }

        .main-pick-box {
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.1) 0%, rgba(17, 22, 18, 0) 100%);
            border-left: 4px solid var(--neon-green);
            padding: 12px;
            border-radius: 4px 12px 12px 4px;
            font-size: 18px;
            font-weight: 700;
            margin-top: 6px;
        }

        .value-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .value-sub-box {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .sub-box-label {
            font-size: 10px;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .sub-box-value {
            font-size: 14px;
            font-weight: 700;
        }

        .section-text {
            font-size: 13px;
            line-height: 1.5;
            color: #cbd5e1;
            margin-top: 6px;
        }

        .confidence-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 14px;
            font-size: 13px;
            color: var(--text-gray);
        }

        .confidence-value {
            color: var(--neon-green);
            font-weight: 700;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--neon-green);
            width: 0%;
            transition: width 0.6s ease-in-out;
        }

        #loading_screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-dark);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-white);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.05);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="loading_screen">
        <div class="spinner"></div>
        <div>Получение аналитики ИИ...</div>
    </div>

    <div class="card">
        <div class="card-meta">📌 СОБЫТИЕ И ТУРНИР</div>
        <div class="match-title" id="match_title">Загрузка...</div>
        <div class="league-title" id="league">Синхронизация с сервером</div>
    </div>

    <div class="card">
        <div class="card-meta">🎯 МАТЕМАТИЧЕСКИЙ ИТОГ МОДЕЛИ</div>
        <div class="main-pick-box" id="capper_pick">—</div>
    </div>

    <div class="card">
        <div class="card-meta">📈 ОЦЕНКА ВАЛУЙНОСТИ (VALUE)</div>
        <div class="section-text" id="value_verdict">—</div>
        
        <div class="value-grid">
            <div class="value-sub-box">
                <span class="sub-box-label">Выгода</span>
                <span class="sub-box-value" id="value_profit">—</span>
            </div>
            <div class="value-sub-box">
                <span class="sub-box-label">Маржа БК</span>
                <span class="sub-box-value" id="margin_eval">—</span>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-meta">📊 ТРЕНДЫ И СОСТОЯНИЕ КОМАНД</div>
        <div class="section-text" id="form_trends">—</div>
    </div>

    <div class="card">
        <div class="card-meta">👥 ИСТОРИЯ ОЧНЫХ ПРОТИВОСТОЯНИЙ</div>
        <div class="section-text" id="head_to_head">—</div>
    </div>

    <div class="card">
        <div class="card-meta">🧠 РАСШИРЕННЫЙ МАТЕМАТИЧЕСКИЙ АНАЛИЗ</div>
        <div class="section-text" id="final_verdict">—</div>
        
        <div class="confidence-row">
            <span>Уверенность модели:</span>
            <span class="confidence-value" id="confidence_percent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="confidence_bar"></div>
        </div>
    </div>

    <div class="navigation-panel">
        <button class="btn-back" onclick="goBack()">
            Назад к панели управления
        </button>
    </div>

    <script>
        const BACKEND_URL = "https://frostbite-unhook-smokiness.ngrok-free.dev";

        // Функция автоматического запроса данных при старте WebApp
        async function loadLastAnalysis() {
            let userId = "373873346"; // Твой ID по умолчанию для тестов
            
            // Если открыто внутри Телеграма, забираем реальный ID юзера
            if (window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user) {
                userId = Telegram.WebApp.initDataUnsafe.user.id.toString();
                Telegram.WebApp.expand(); // Раскрываем во весь экран
            }

            try {
                // Стучимся на эндпоинт получения данных пользователя
                const response = await fetch(`${BACKEND_URL}/api/user/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({ user_id: userId })
                });

                const data = await response.json();
                
                // Проверяем, прилетел ли кэш анализа
                if (data.success && data.last_analysis) {
                    updateUI(data.last_analysis);
                } else if (localStorage.getItem('last_analysis')) {
                    // Если сервер не ответил, но в памяти телефона есть старый кэш — берем его
                    updateUI(JSON.parse(localStorage.getItem('last_analysis')));
                } else {
                    document.getElementById('loading_screen').style.display = 'none';
                    document.getElementById('match_title').innerText = "Анализ не найден";
                    document.getElementById('league').innerText = "Отправьте боту скриншот, чтобы начать";
                }
            } catch (error) {
                console.error("Ошибка автозагрузки:", error);
                // Запасной вариант из локального хранилища
                const cached = localStorage.getItem('last_analysis');
                if(cached) {
                    updateUI(JSON.parse(cached));
                } else {
                    document.getElementById('loading_screen').style.display = 'none';
                    alert("Не удалось загрузить данные с сервера.");
                }
            }
        }

        // Заполнение элементов вёрстки данными из JSON
        function updateUI(analysisData) {
            if(!analysisData) return;
            
            // Прячем спиннер загрузки
            document.getElementById('loading_screen').style.display = 'none';

            if(analysisData.match_title) document.getElementById('match_title').innerText = analysisData.match_title;
            if(analysisData.league) document.getElementById('league').innerText = analysisData.league;
            if(analysisData.capper_pick) document.getElementById('capper_pick').innerText = analysisData.capper_pick;
            if(analysisData.value_verdict) document.getElementById('value_verdict').innerText = analysisData.value_verdict;
            if(analysisData.value_profit) document.getElementById('value_profit').innerText = analysisData.value_profit;
            if(analysisData.margin_eval) document.getElementById('margin_eval').innerText = analysisData.margin_eval;
            if(analysisData.form_trends) document.getElementById('form_trends').innerText = analysisData.form_trends;
            if(analysisData.head_to_head) document.getElementById('head_to_head').innerText = analysisData.head_to_head;
            if(analysisData.final_verdict) document.getElementById('final_verdict').innerText = analysisData.final_verdict;
            
            if(analysisData.confidence_percent) {
                const pct = parseInt(analysisData.confidence_percent) || 0;
                document.getElementById('confidence_percent').innerText = pct + "%";
                document.getElementById('confidence_bar').style.width = pct + "%";
            }
        }

        function goBack() {
            if(window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.close();
            } else {
                window.history.back();
            }
        }

        // Запуск авто-запроса сразу при открытии страницы
        window.addEventListener('DOMContentLoaded', loadLastAnalysis);
    </script>
</body>
</html>
